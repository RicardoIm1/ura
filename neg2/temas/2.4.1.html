<body>
    <h2>2.4.1 Pendiente de una recta tangente a una curva</h2>
    <h3>Fórmula de la derivada</h3>
    
    <p>\[
    m_{\text{tang}} = \lim_{x \to a} \frac{f(x) - f(a)}{x - a} = \lim_{h \to 0} \frac{f(a+h) - f(a)}{h}
    \]</p>
    
    <p>Esta pendiente instantánea es la definición de la derivada \(f'(a)\).</p>
</body>

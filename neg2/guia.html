<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            color: #1e293b;
            line-height: 1.5;
        }

        header {
            background: linear-gradient(135deg, #0f2b6d, #1e3a8a);
            color: white;
            padding: 1.2rem 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .header-logo {
            height: 55px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 6px 12px;
            font-weight: 700;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-logo img {
            height: 42px;
            width: auto;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.2rem;
        }
        
        .accordion {
            background: #fff;
            margin-bottom: 1rem;
            border-radius: .6rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .08);
        }

        .accordion-header {
            padding: 1rem;
            background: #283593;
            color: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            user-select: none;
        }

        .accordion-content {
            display: none;
            padding: 1rem;
        }

        .math-equation {
            background: #eceff1;
            padding: .8rem;
            border-radius: .5rem;
            margin-bottom: 1rem;
            font-family: 'Courier New';
            font-size: 1.1rem;
        }

        .quiz-box {
            background: #f5f9ff;
            border-left: 4px solid #1a73e8;
            padding: 1rem;
            border-radius: .5rem;
            margin-top: 1rem;
        }

        .quiz-box input {
            padding: .5rem;
            border: 1px solid #90caf9;
            border-radius: .3rem;
            width: 60%;
            margin-right: .5rem;
            font-size: 1rem;
        }

        .quiz-box button {
            padding: .5rem .8rem;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: .3rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        .quiz-box button:hover {
            background: #0d47a1;
        }

        .progress {
            margin: 1rem 0;
            height: 22px;
            background: #c5cae9;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-inner {
            height: 100%;
            width: 0%;
            background: #1a73e8;
            transition: .4s;
        }

            </a>
            <div class="header-title">Guía de Estudio Para el exámen de Matemáticas para los Negocios 2<br><span style="font-size:0.8rem;">Matrices ·
                    Derivadas · Optimización</span></div>
        </div>
    </header>

    <div class="container">
        <div class="progress-wrapper">
            <div class="progress-bar" id="globalProgress"></div>
        </div>

            <span>✅ Progreso general</span>

        <div id="ejerciciosContainer"></div>
        <footer>Estudio activo: revisa cada ejercicio, despliega el desarrollo y verifica tus respuestas. ¡Practica!
        </footer>

    <script>
        // --------------------------------------------------------------
        // DATOS COMPLETOS: 30 ejercicios desde el contenido original
        // --------------------------------------------------------------
        const ejercicios = [
            // TEMA 1: MATRICES
            { tema: "1.1 Definición de matriz, orden y nomenclatura", titulo: "Ejercicio 1: Orden y nomenclatura", consigna: "Dada la matriz \\(A = \\begin{bmatrix} 2 & -1 & 0 \\\\ 4 & 3 & 5 \\end{bmatrix}\\), indica su orden y nomenclatura.", desarrollo: "Línea 1: La matriz tiene 2 filas y 3 columnas.<br>Concepto: Se cuentan las filas (horizontales) y las columnas (verticales).<br>Línea 2: Por lo tanto, su orden es \\(2 \\times 3\\) (se lee “2 por 3”).<br>Concepto: El orden de una matriz se expresa como \\(m \\times n\\), donde \\(m\\) es el número de filas y \\(n\\) el de columnas.<br>Línea 3: La nomenclatura es \\(A=[a_{ij}]\\) con \\(i=1,2\\) y \\(j=1,2,3\\).<br>Concepto: \\(a_{ij}\\) representa el elemento de la fila \\(i\\), columna \\(j\\)." },
            { tema: "1.1 Definición", titulo: "Ejercicio 2: Igualdad de matrices", consigna: "Encuentra los valores de \\(x, y, z\\) si \\(\\begin{bmatrix} x+y & 3 \\\\ 2x-y & z \\end{bmatrix} = \\begin{bmatrix} 5 & 3 \\\\ 0 & 4 \\end{bmatrix}\\).", desarrollo: "Línea 1: Igualamos elemento a elemento por definición de igualdad de matrices.<br>Concepto: Dos matrices son iguales si tienen el mismo orden y sus elementos correspondientes son iguales.<br>Línea 2: \\(x+y=5\\) (ecuación 1).<br>Línea 3: \\(2x-y=0\\) (ecuación 2).<br>Línea 4: \\(z=4\\).<br>Línea 5: Sumando: \\((x+y)+(2x-y)=5+0 \\rightarrow 3x=5 \\rightarrow x=5/3\\).<br>Línea 6: Sustituyendo: \\(5/3 + y =5 \\rightarrow y=10/3\\).<br>Línea 7: Solución: \\(x=5/3,\\; y=10/3,\\; z=4\\)." },
            { tema: "1.2 Clasificación de matrices", titulo: "Ejercicio 3: Clasificar matrices", consigna: "Clasifica según tipo: \\(A=\\begin{bmatrix}1&0\\\\0&1\\end{bmatrix}, B=\\begin{bmatrix}2&0\\\\0&-3\\end{bmatrix}, C=\\begin{bmatrix}1&2&3\\\\4&5&6\\end{bmatrix}, D=\\begin{bmatrix}3&4\\\\0&5\\\\0&0\\end{bmatrix}, E=\\begin{bmatrix}2&1&0\\\\0&3&4\\\\0&0&5\\end{bmatrix}\\).", desarrollo: "Línea 1: \\(A\\) es \\(2\\times2\\), unos en diagonal y ceros fuera → identidad.<br>Línea 2: \\(B\\) cuadrada, solo diagonal no nula → diagonal.<br>Línea 3: \\(C\\) es \\(2\\times3\\), filas≠columnas → rectangular.<br>Línea 4: \\(D\\) es \\(3\\times2\\), rectangular (clasificación triangular solo para cuadradas).<br>Línea 5: \\(E\\) es \\(3\\times3\\), ceros debajo de diagonal principal → triangular superior." },
            { tema: "1.3 Operaciones (suma)", titulo: "Ejercicio 4: Suma de matrices", consigna: "\\(A=\\begin{bmatrix}1&2\\\\3&4\\end{bmatrix}, B=\\begin{bmatrix}5&6\\\\7&8\\end{bmatrix}\\). Calcula \\(A+B\\).", desarrollo: "Línea 1: Verificamos mismo orden \\(2\\times2\\).<br>Concepto: La suma está definida si tienen el mismo orden.<br>Línea 2: Sumamos elemento a elemento: \\(\\begin{bmatrix}1+5 & 2+6\\\\3+7 & 4+8\\end{bmatrix}\\).<br>Línea 3: Resultado: \\(\\begin{bmatrix}6&8\\\\10&12\\end{bmatrix}\\)." },
            { tema: "1.3 Resta", titulo: "Ejercicio 5: Resta de matrices", consigna: "Con las matrices del ejercicio 4, calcula \\(A-B\\).", desarrollo: "Línea 1: Restamos elemento a elemento: \\(\\begin{bmatrix}1-5 & 2-6\\\\3-7 & 4-8\\end{bmatrix}\\).<br>Línea 2: Resultado: \\(\\begin{bmatrix}-4&-4\\\\-4&-4\\end{bmatrix}\\)." },
            { tema: "1.3 Producto por escalar", titulo: "Ejercicio 6: Producto por escalar", consigna: "Sea \\(A=\\begin{bmatrix}2&-1\\\\0&3\\end{bmatrix}\\), calcula \\(3A\\).", desarrollo: "Línea 1: Multiplicamos cada elemento por 3: \\(\\begin{bmatrix}3\\cdot2 & 3\\cdot(-1)\\\\3\\cdot0 & 3\\cdot3\\end{bmatrix}\\).<br>Línea 2: Resultado: \\(\\begin{bmatrix}6&-3\\\\0&9\\end{bmatrix}\\)." },
            { tema: "1.3 Producto de matrices", titulo: "Ejercicio 7: Producto (2x2)", consigna: "\\(A=\\begin{bmatrix}1&2\\\\3&4\\end{bmatrix}, B=\\begin{bmatrix}0&1\\\\2&3\\end{bmatrix}\\), calcula \\(A\\cdot B\\).", desarrollo: "Línea 1: Compatibles \\(2\\times2\\).<br>Línea 2: \\(c_{11}=1\\cdot0+2\\cdot2=4\\).<br>Línea 3: \\(c_{12}=1\\cdot1+2\\cdot3=7\\).<br>Línea 4: \\(c_{21}=3\\cdot0+4\\cdot2=8\\).<br>Línea 5: \\(c_{22}=3\\cdot1+4\\cdot3=15\\).<br>Resultado: \\(\\begin{bmatrix}4&7\\\\8&15\\end{bmatrix}\\)." },
            { tema: "1.3 Producto no cuadradas", titulo: "Ejercicio 8: Producto matrices no cuadradas", consigna: "\\(A_{2\\times3}=\\begin{bmatrix}1&2&3\\\\4&5&6\\end{bmatrix}, B_{3\\times2}=\\begin{bmatrix}7&8\\\\9&10\\\\11&12\\end{bmatrix}\\). Calcula \\(AB\\).", desarrollo: "Línea 1: \\(A(2\\times3)\\) \\(B(3\\times2)\\) → resultado \\(2\\times2\\).<br>\\(c_{11}=1\\cdot7+2\\cdot9+3\\cdot11=58\\)<br>\\(c_{12}=1\\cdot8+2\\cdot10+3\\cdot12=64\\)<br>\\(c_{21}=4\\cdot7+5\\cdot9+6\\cdot11=139\\)<br>\\(c_{22}=4\\cdot8+5\\cdot10+6\\cdot12=154\\)<br>Resultado: \\(\\begin{bmatrix}58&64\\\\139&154\\end{bmatrix}\\)." },
            { tema: "1.4 Representación matricial", titulo: "Ejercicio 9: Sistema a forma matricial", consigna: "Expresa \\(\\begin{cases}2x+3y=5\\\\4x-y=1\\end{cases}\\) en forma matricial.", desarrollo: "Línea 1: Matriz coeficientes \\(A=\\begin{bmatrix}2&3\\\\4&-1\\end{bmatrix}\\), vector \\(X=\\begin{bmatrix}x\\\\y\\end{bmatrix}\\), constantes \\(B=\\begin{bmatrix}5\\\\1\\end{bmatrix}\\).<br>Representación: \\(AX=B\\)." },
            { tema: "1.4 Matriz inversa", titulo: "Ejercicio 10: Inversa 2x2", consigna: "Calcula la inversa de \\(A=\\begin{bmatrix}2&3\\\\1&4\\end{bmatrix}\\).", desarrollo: "Fórmula: \\(A^{-1}=\\frac{1}{ad-bc}\\begin{bmatrix}d&-b\\\\-c&a\\end{bmatrix}\\).<br>Determinante: \\(2\\cdot4-3\\cdot1=8-3=5\\).<br>\\(A^{-1}=\\frac{1}{5}\\begin{bmatrix}4&-3\\\\-1&2\\end{bmatrix}=\\begin{bmatrix}4/5&-3/5\\\\-1/5&2/5\\end{bmatrix}\\)." },
            { tema: "1.4 Gauss-Jordan", titulo: "Ejercicio 11: Sistema por Gauss-Jordan", consigna: "Resuelve el sistema del ejercicio 9 por Gauss-Jordan.", desarrollo: "Matriz ampliada: \\(\\begin{bmatrix}2&3&5\\\\4&-1&1\\end{bmatrix}\\).<br>F1/2: \\([1\\;1.5\\;2.5]\\)<br>F2 = F2 -4F1: \\([0\\;-7\\;-9]\\)<br>F2/-7: \\([0\\;1\\;9/7]\\)<br>F1 = F1 -1.5F2: \\([1\\;0\\;4/7]\\)<br>Solución: \\(x=4/7,\\; y=9/7\\)." },
            // TEMA 2: DERIVADAS
            { tema: "2.1 Dominio", titulo: "Ejercicio 12: Dominio función", consigna: "Encuentra el dominio de \\(f(x)=\\frac{1}{x-2}+\\sqrt{x+1}\\).", desarrollo: "Para \\(\\frac{1}{x-2}\\), \\(x\\neq2\\).<br>Para \\(\\sqrt{x+1}\\), \\(x+1\\ge0 \\Rightarrow x\\ge-1\\).<br>Intersección: \\(x\\ge-1\\) y \\(x\\neq2\\).<br>Dominio: \\([-1,2)\\cup(2,\\infty)\\)." },
            { tema: "2.1 Rango", titulo: "Ejercicio 13: Rango en intervalo", consigna: "Halla el rango de \\(f(x)=x^2+3\\) para \\(x\\in[-2,1]\\).", desarrollo: "Vértice en \\(x=0\\) (dentro). Evaluamos: \\(f(-2)=7, f(1)=4, f(0)=3\\).<br>Mínimo 3, máximo 7 → Rango: \\([3,7]\\)." },
            { tema: "2.2 Límite", titulo: "Ejercicio 14: Límite algebraico", consigna: "Calcula \\(\\lim_{x\\to 2}\\frac{x^2-4}{x-2}\\).", desarrollo: "Factorizamos: \\(\\frac{(x-2)(x+2)}{x-2}=x+2\\), \\(x\\neq2\\).<br>Límite: \\(2+2=4\\)." },
            { tema: "2.2 Racionalización", titulo: "Ejercicio 15: Límite con raíz", consigna: "\\(\\lim_{x\\to 0}\\frac{\\sqrt{x+4}-2}{x}\\).", desarrollo: "Multiplicamos conjugado: \\(\\frac{(\\sqrt{x+4}-2)(\\sqrt{x+4}+2)}{x(\\sqrt{x+4}+2)}=\\frac{x}{x(\\sqrt{x+4}+2)}=\\frac{1}{\\sqrt{x+4}+2}\\).<br>Evaluando: \\(\\frac{1}{2+2}=1/4\\)." },
            { tema: "2.3 Derivadas básicas", titulo: "Ejercicio 16: Derivada polinomial", consigna: "Deriva \\(f(x)=5x^4-3x^2+7x-2\\).", desarrollo: "\\(f'(x)=5\\cdot4x^3-3\\cdot2x+7 =20x^3-6x+7\\)." },
            { tema: "2.3 Regla del producto", titulo: "Ejercicio 17: Derivada producto", consigna: "Deriva \\(g(x)=(3x^2+1)(2x-5)\\).", desarrollo: "\\(u=3x^2+1, u'=6x; v=2x-5, v'=2\\).<br>\\(g'(x)=6x(2x-5)+(3x^2+1)\\cdot2 =12x^2-30x+6x^2+2=18x^2-30x+2\\)." },
            { tema: "2.3 Regla del cociente", titulo: "Ejercicio 18: Derivada cociente", consigna: "Deriva \\(h(x)=\\frac{x^2}{x+1}\\).", desarrollo: "\\(h'(x)=\\frac{2x(x+1)-x^2\\cdot1}{(x+1)^2}=\\frac{2x^2+2x-x^2}{(x+1)^2}=\\frac{x^2+2x}{(x+1)^2}=\\frac{x(x+2)}{(x+1)^2}\\)." },
            { tema: "2.3 Regla de la cadena", titulo: "Ejercicio 19: Derivada raíz", consigna: "Deriva \\(f(x)=\\sqrt{5x+3}\\).", desarrollo: "\\(f(x)=(5x+3)^{1/2}\\), \\(f'(x)=\\frac{1}{2}(5x+3)^{-1/2}\\cdot5 =\\frac{5}{2\\sqrt{5x+3}}\\)." },
            { tema: "2.4 Interpretación geométrica", titulo: "Ejercicio 20: Pendiente tangente", consigna: "Halla pendiente de \\(f(x)=x^2\\) en \\(x=3\\).", desarrollo: "\\(f'(x)=2x\\), \\(f'(3)=6\\). Pendiente = 6." },
            { tema: "2.4 Ecuación recta tangente", titulo: "Ejercicio 21: Recta tangente", consigna: "Ecuación de la tangente a \\(f(x)=x^2\\) en \\(x=3\\).", desarrollo: "Punto \\((3,9)\\), pendiente 6. Ecuación: \\(y-9=6(x-3) \\Rightarrow y=6x-9\\)." },
            { tema: "2.4 Rapidez de cambio", titulo: "Ejercicio 22: Velocidad instantánea", consigna: "\\(s(t)=t^3-2t+1\\), halla velocidad en \\(t=2\\).", desarrollo: "\\(v(t)=s'(t)=3t^2-2\\). \\(v(2)=3(4)-2=10\\) m/s." },
            // TEMA 3: OPTIMIZACIÓN
            { tema: "3.1 Segunda derivada", titulo: "Ejercicio 23: Segunda derivada", consigna: "Halla \\(f''(x)\\) de \\(f(x)=x^3-3x^2+2x-1\\).", desarrollo: "\\(f'(x)=3x^2-6x+2\\), \\(f''(x)=6x-6\\)." },
            { tema: "3.1 Criterio segunda derivada", titulo: "Ejercicio 24: Máx/mín con 2da derivada", consigna: "Para \\(f(x)=x^3-3x^2+2\\), determina si \\(x=2\\) es máximo o mínimo.", desarrollo: "\\(f'(x)=3x^2-6x=3x(x-2)\\), puntos críticos \\(x=0,2\\).<br>\\(f''(x)=6x-6\\), \\(f''(2)=6>0\\) → mínimo local." },
            { tema: "3.2 Extremos absolutos", titulo: "Ejercicio 25: Extremos en intervalo", consigna: "Extremos absolutos de \\(f(x)=x^3-3x^2+2\\) en \\([-1,3]\\).", desarrollo: "Críticos: \\(0,2\\). Evaluamos: \\(f(-1)=-2, f(0)=2, f(2)=-2, f(3)=2\\).<br>Máx absoluto =2 en \\(x=0,3\\); mín absoluto =-2 en \\(x=-1,2\\)." },
            { tema: "3.2 Optimización caja", titulo: "Ejercicio 26: Caja de lámina", consigna: "Lámina cuadrada 12 cm, cortar cuadrados esquinas para caja abierta. Maximizar volumen.", desarrollo: "Volumen \\(V(x)=x(12-2x)^2\\), \\(0<x<6\\).<br>\\(V'(x)=(12-2x)^2-4x(12-2x)=(12-2x)(12-6x)=0\\) → \\(x=2\\) (válido).<br>Máximo en \\(x=2\\) cm." },
            { tema: "3.3 Máximos locales", titulo: "Ejercicio 27: Máximos y mínimos locales", consigna: "\\(f(x)=\\frac13 x^3 -x^2-3x+2\\), halla extremos locales.", desarrollo: "\\(f'(x)=x^2-2x-3=(x-3)(x+1)\\), críticos \\(x=3,-1\\).<br>\\(f''(x)=2x-2\\); \\(f''(-1)=-4<0\\) → máximo local en \\(x=-1\\); \\(f''(3)=4>0\\) → mínimo local en \\(x=3\\)." },
            { tema: "3.3 Utilidad máxima", titulo: "Ejercicio 28: Maximizar utilidad", consigna: "Costo \\(C(x)=0.1x^2+5x+100\\), Ingreso \\(I(x)=20x-0.05x^2\\). Hallar producción óptima.", desarrollo: "Utilidad \\(U(x)=15x-0.15x^2-100\\). \\(U'(x)=15-0.3x=0\\) → \\(x=50\\). \\(U''(x)=-0.3<0\\) → máximo. Producción 50 unidades." },
            { tema: "3.3 Punto más cercano", titulo: "Ejercicio 29: Punto parábola más cercano", consigna: "Punto de \\(y=x^2\\) más cercano a \\((0,3)\\).", desarrollo: "Distancia^2: \\(D(x)=x^2+(x^2-3)^2=x^4-5x^2+9\\).<br>\\(D'(x)=4x^3-10x=2x(2x^2-5)=0\\) → \\(x=0, \\pm\\sqrt{2.5}\\).<br>Evaluando: \\(D(\\pm\\sqrt{2.5})=2.75\\) menor, puntos \\((\\pm\\sqrt{2.5},2.5)\\)." },
            { tema: "3.3 Ingreso vs utilidad", titulo: "Ejercicio 30: Maximizar ingreso y utilidad", consigna: "Precio \\(p=50-0.5q\\), costo \\(C(q)=10q+200\\). Hallar q que max ingreso y max utilidad.", desarrollo: "Ingreso \\(R(q)=50q-0.5q^2\\), \\(R'(q)=50-q=0\\) → \\(q=50\\) max ingreso.<br>Utilidad \\(U(q)=40q-0.5q^2-200\\), \\(U'(q)=40-q=0\\) → \\(q=40\\) max utilidad." }
        ];

        let ejerciciosEstado = new Array(ejercicios.length).fill(false); // false = desarrollo oculto (visto?)

        function actualizarProgreso() {
            const revisados = ejerciciosEstado.filter(v => v === true).length;
            const porcentaje = Math.round((revisados / ejercicios.length) * 100);
            const barra = document.getElementById("globalProgress");
            const texto = document.getElementById("progressText");
            if (barra) barra.style.width = porcentaje + "%";
            if (texto) texto.innerText = porcentaje + "% completado";
            if (porcentaje === 100) {
                canvasConfetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
            }
        }

        function toggleDesarrollo(idx, btnElement, contentId) {
            const contentDiv = document.getElementById(contentId);
            if (!contentDiv) return;
            const isVisible = contentDiv.style.display !== "none";
            if (!isVisible) {
                contentDiv.style.display = "block";
                btnElement.innerText = "Ocultar desarrollo";
                ejerciciosEstado[idx] = true;
            } else {
                contentDiv.style.display = "none";
                btnElement.innerText = "Mostrar desarrollo";
                // no cambiamos estado a false para mantener progreso si ya se mostró alguna vez.
            }
            actualizarProgreso();
        }

        function renderEjercicios() {
            const container = document.getElementById("ejerciciosContainer");
            if (!container) return;
            let html = "";
            ejercicios.forEach((ej, i) => {
                const uniqueId = `dev-${i}`;
                const headerId = `header-${i}`;
                const isActive = false; // inicial cerrado
                html += `
                <div class="accordion" id="accordion-${i}">
                    <div class="accordion-header" data-idx="${i}">
                        <span><strong>${ej.titulo}</strong><br><span style="font-size:0.75rem; color:#4b5563;">${ej.tema}</span></span>
                        <span class="status-badge" id="badge-${i}">📘 ejercicio</span>
                    </div>
                    <div class="accordion-content" id="content-${i}">
                        <div class="math-block">
                            📌 <strong>Consigna:</strong> ${ej.consigna}
                        </div>
                        <div>
                            <button class="btn-toggle" id="toggleBtn-${i}" data-idx="${i}">Mostrar desarrollo</button>
                        </div>
                        <div id="${uniqueId}" style="display:none; margin-top:12px;">
                            <div class="desarrollo">
                                ${ej.desarrollo}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            });
            container.innerHTML = html;

            // Eventos para acordeones (abrir/cerrar)
            for (let i = 0; i < ejercicios.length; i++) {
                const header = document.querySelector(`.accordion-header[data-idx="${i}"]`);
                const contentPanel = document.getElementById(`content-${i}`);
                if (header && contentPanel) {
                    header.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const accordionDiv = document.getElementById(`accordion-${i}`);
                        accordionDiv.classList.toggle("active");
                    });
                }
                const toggleBtn = document.getElementById(`toggleBtn-${i}`);
                if (toggleBtn) {
                    const devDiv = document.getElementById(`dev-${i}`);
                    toggleBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if (devDiv.style.display === "none" || devDiv.style.display === "") {
                            devDiv.style.display = "block";
                            toggleBtn.innerText = "Ocultar desarrollo";
                            if (!ejerciciosEstado[i]) {
                                ejerciciosEstado[i] = true;
                                actualizarProgreso();
                            }
                        } else {
                            devDiv.style.display = "none";
                            toggleBtn.innerText = "Mostrar desarrollo";
                        }
                    });
                }
            }
            // Inicializar progreso
            actualizarProgreso();
        }

        renderEjercicios();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Graficadora Premium</title>
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
    }
    .container {
      margin-top: 20px;
      background: #1a1a1a;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,255,180,0.4);
      padding: 20px;
      width: 700px;
    }
    h2 {
      margin-top: 0;
      color: #0ff;
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      font-size: 1em;
      background: #222;
      color: #0ff;
      box-shadow: inset 0 0 5px #0ff;
    }
    button {
      background: #0ff;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 15px;
    }
    button:hover {
      background: #00ffaa;
      box-shadow: 0 0 20px #00ffaa;
    }
    canvas {
      background: #111;
      border-radius: 10px;
      width: 100%;
      height: 400px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Graficadora Premium</h2>
    <textarea id="funciones" placeholder="Ejemplo:
f(x)=4x^2+3x-2
sin(x)
exp(x)"></textarea>
    <button onclick="graficar()">Graficar</button>
    <canvas id="grafica" width="700" height="400"></canvas>
  </div>

  <script>
    // Convierte notación matemática a sintaxis JS
    function convertir(expr) {
      let e = expr.toLowerCase().trim();

      // quitar "f(x)=" si existe
      e = e.replace(/^f\(x\)=/, "");

      // reemplazar potencias ^ por Math.pow
      e = e.replace(/([0-9a-z]+)\^([0-9a-z]+)/gi, "Math.pow($1,$2)");

      // insertar * entre número y x (ej: 4x -> 4*x)
      e = e.replace(/([0-9])x/gi, "$1*x");

      // funciones comunes sin "Math."
      e = e.replace(/\bsin\(/g, "Math.sin(");
      e = e.replace(/\bcos\(/g, "Math.cos(");
      e = e.replace(/\btan\(/g, "Math.tan(");
      e = e.replace(/\bexp\(/g, "Math.exp(");
      e = e.replace(/\bln\(/g, "Math.log(");
      e = e.replace(/\bsqrt\(/g, "Math.sqrt(");
      e = e.replace(/\bpi\b/g, "Math.PI");

      return e;
    }

    function graficar() {
      const canvas = document.getElementById('grafica');
      const ctx = canvas.getContext('2d');
      const exprs = document.getElementById('funciones').value.split('\n').filter(e => e.trim() !== '');

      // limpiar
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const scaleX = 40; // píxeles por unidad
      const scaleY = 40;
      const offsetX = canvas.width/2;
      const offsetY = canvas.height/2;

      // rejilla
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      for (let gx = 0; gx < canvas.width; gx += scaleX) {
        ctx.beginPath();
        ctx.moveTo(gx, 0);
        ctx.lineTo(gx, canvas.height);
        ctx.stroke();
      }
      for (let gy = 0; gy < canvas.height; gy += scaleY) {
        ctx.beginPath();
        ctx.moveTo(0, gy);
        ctx.lineTo(canvas.width, gy);
        ctx.stroke();
      }

      // ejes
      ctx.strokeStyle = '#0ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, offsetY);
      ctx.lineTo(canvas.width, offsetY);
      ctx.moveTo(offsetX, 0);
      ctx.lineTo(offsetX, canvas.height);
      ctx.stroke();

      // colores
      const colores = ['#00ffaa','#ff00aa','#ffaa00','#00aaff','#aaff00','#ff4444'];

      exprs.forEach((expr, idx) => {
        const jsExpr = convertir(expr);
        ctx.strokeStyle = colores[idx % colores.length];
        ctx.lineWidth = 2;
        ctx.beginPath();
        let firstPoint = true;

        for (let px = 0; px < canvas.width; px++) {
          const x = (px - offsetX) / scaleX;
          let y;
          try {
            y = Function("x", "return " + jsExpr)(x);
          } catch {
            y = NaN;
          }
          if (!isNaN(y) && isFinite(y)) {
            const py = offsetY - y * scaleY;
            if (firstPoint) {
              ctx.moveTo(px, py);
              firstPoint = false;
            } else {
              ctx.lineTo(px, py);
            }
          } else {
            firstPoint = true;
          }
        }
        ctx.stroke();
      });
    }
  </script>
</body>
</html>

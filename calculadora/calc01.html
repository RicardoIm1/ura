<!DOCTYPE html> <!-- Define que el documento usa HTML5 -->
<html lang="es"> <!-- Inicia el documento HTML con idioma español -->
<head> <!-- Cabecera del documento: contiene metadatos y configuraciones -->
  <meta charset="UTF-8"> <!-- Especifica la codificación de caracteres UTF-8 para soportar acentos y símbolos -->
  <title>Calculadora Científica Premium</title> <!-- Título que aparece en la pestaña del navegador -->
  <style> /* Inicio de los estilos CSS */
    body { /* Estilos para el cuerpo de la página */
      background: #0d0d0d; /* Fondo negro oscuro */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Fuente principal y alternativas */
      display: flex; /* Activa Flexbox para centrar contenido */
      justify-content: center; /* Centra horizontalmente */
      align-items: center; /* Centra verticalmente */
      height: 100vh; /* Altura igual al 100% del viewport */
      margin: 0; /* Elimina márgenes por defecto */
    }
    .calculator { /* Estilos para el contenedor principal de la calculadora */
      background: #1a1a1a; /* Fondo gris muy oscuro */
      border-radius: 20px; /* Bordes redondeados de 20px */
      box-shadow: 0 0 40px rgba(0,255,180,0.4); /* Sombra exterior verde azulada */
      padding: 20px; /* Espaciado interno de 20px */
      width: 380px; /* Ancho fijo de 380 píxeles */
    }
    .display { /* Estilos para la pantalla de la calculadora */
      background: #000; /* Fondo negro */
      color: #0ff; /* Texto en color cian fluorescente */
      font-size: 2em; /* Tamaño de fuente del doble del normal */
      text-align: right; /* Texto alineado a la derecha */
      padding: 15px; /* Espaciado interno */
      border-radius: 10px; /* Bordes redondeados */
      margin-bottom: 20px; /* Margen inferior para separar de los botones */
      box-shadow: inset 0 0 10px #0ff; /* Sombra interior cian */
      overflow-x: auto; /* Permite scroll horizontal si el texto es muy largo */
    }
    .buttons { /* Estilos para el contenedor de botones */
      display: grid; /* Usa CSS Grid para organizar botones */
      grid-template-columns: repeat(5, 1fr); /* Crea 5 columnas de igual tamaño */
      gap: 10px; /* Espacio de 10px entre botones */
    }
    button { /* Estilos base para todos los botones */
      background: #222; /* Fondo gris oscuro */
      color: #fff; /* Texto blanco */
      font-size: 1em; /* Tamaño de fuente normal */
      padding: 15px; /* Espaciado interno */
      border: none; /* Sin borde */
      border-radius: 8px; /* Bordes redondeados */
      cursor: pointer; /* Cambia el cursor a mano al pasar */
      transition: all 0.2s ease; /* Transición suave para efectos hover */
      box-shadow: 0 0 10px rgba(0,255,180,0.2); /* Sombra sutil cian */
    }
    button:hover { /* Efecto al pasar el mouse sobre los botones */
      background: #0ff; /* Fondo cian */
      color: #000; /* Texto negro */
      box-shadow: 0 0 20px #0ff; /* Sombra cian más intensa */
    }
    .span-2 { /* Clase para botones que ocupan 2 columnas */
      grid-column: span 2; /* Expande el botón a través de 2 columnas */
    }
    .span-3 { /* Clase para botones que ocupan 3 columnas */
      grid-column: span 3; /* Expande el botón a través de 3 columnas */
    }
    .equal { /* Estilos específicos para el botón igual */
      background: #0ff; /* Fondo cian */
      color: #000; /* Texto negro */
      font-weight: bold; /* Texto en negrita */
    }
    .equal:hover { /* Efecto hover específico para el botón igual */
      background: #00ffaa; /* Fondo verde cian más claro */
      box-shadow: 0 0 25px #00ffaa; /* Sombra más grande e intensa */
    }
  </style> <!-- Fin de los estilos CSS -->
</head> <!-- Fin de la cabecera -->
<body> <!-- Cuerpo del documento: contenido visible -->
  <div class="calculator"> <!-- Contenedor principal de la calculadora -->
    <div class="display" id="display">0</div> <!-- Pantalla con ID para JavaScript y valor inicial 0 -->
    <div class="buttons"> <!-- Contenedor de la cuadrícula de botones -->
      <!-- Fila 1: Botones de control y operadores básicos -->
      <button onclick="clearDisplay()">C</button> <!-- Botón para limpiar todo -->
      <button onclick="deleteChar()">⌫</button> <!-- Botón para borrar último carácter -->
      <button onclick="append('(')">(</button> <!-- Botón para paréntesis abierto -->
      <button onclick="append(')')">)</button> <!-- Botón para paréntesis cerrado -->
      <button onclick="append('/')">÷</button> <!-- Botón para división -->

      <!-- Fila 2: Números 7-9 y operadores × y √ -->
      <button onclick="append('7')">7</button> <!-- Botón número 7 -->
      <button onclick="append('8')">8</button> <!-- Botón número 8 -->
      <button onclick="append('9')">9</button> <!-- Botón número 9 -->
      <button onclick="append('*')">×</button> <!-- Botón multiplicación (usa * en código) -->
      <button onclick="append('Math.sqrt(')">√</button> <!-- Botón raíz cuadrada -->

      <!-- Fila 3: Números 4-6 y operadores − y xʸ -->
      <button onclick="append('4')">4</button> <!-- Botón número 4 -->
      <button onclick="append('5')">5</button> <!-- Botón número 5 -->
      <button onclick="append('6')">6</button> <!-- Botón número 6 -->
      <button onclick="append('-')">−</button> <!-- Botón resta -->
      <button onclick="append('Math.pow(')">xʸ</button> <!-- Botón potencia (x elevado a y) -->

      <!-- Fila 4: Números 1-3 y operadores + y π -->
      <button onclick="append('1')">1</button> <!-- Botón número 1 -->
      <button onclick="append('2')">2</button> <!-- Botón número 2 -->
      <button onclick="append('3')">3</button> <!-- Botón número 3 -->
      <button onclick="append('+')">+</button> <!-- Botón suma -->
      <button onclick="append('Math.PI')">π</button> <!-- Botón constante Pi -->

      <!-- Fila 5: Botones especiales y funciones trigonométricas -->
      <button onclick="append('0')" class="span-2">0</button> <!-- Botón cero ocupa 2 columnas -->
      <button onclick="append('.')">.</button> <!-- Botón punto decimal -->
      <button onclick="calculate()" class="equal span-2">=</button> <!-- Botón igual con clases especiales -->

      <!-- Fila 6: Funciones matemáticas avanzadas -->
      <button onclick="append('Math.sin(')">sin</button> <!-- Botón seno -->
      <button onclick="append('Math.cos(')">cos</button> <!-- Botón coseno -->
      <button onclick="append('Math.tan(')">tan</button> <!-- Botón tangente -->
      <button onclick="append('Math.log(')">ln</button> <!-- Botón logaritmo natural -->
      <button onclick="append('Math.exp(')">exp</button> <!-- Botón exponencial (e^x) -->
    </div> <!-- Fin del contenedor de botones -->
  </div> <!-- Fin del contenedor de la calculadora -->

  <script> // Inicio del código JavaScript
    const display = document.getElementById('display'); // Obtiene referencia al elemento de la pantalla por su ID

    function append(value) { // Función para añadir caracteres a la pantalla
      if (display.innerText === "0") { // Si la pantalla muestra solo "0"
        display.innerText = value; // Reemplaza el 0 con el nuevo valor
      } else { // Si ya hay otros números
        display.innerText += value; // Añade el nuevo valor al final
      }
    }

    function clearDisplay() { // Función para limpiar la pantalla
      display.innerText = "0"; // Restablece la pantalla a "0"
    }

    function deleteChar() { // Función para borrar el último carácter
      display.innerText = display.innerText.slice(0, -1) || "0"; // Elimina el último carácter o muestra "0" si está vacío
    }

    function calculate() { // Función para evaluar la expresión matemática
      try { // Intenta ejecutar el código que podría causar error
        display.innerText = eval(display.innerText); // Evalúa la expresión matemática y muestra el resultado
      } catch { // Si ocurre un error
        display.innerText = "Error"; // Muestra "Error" en la pantalla
      }
    }
  </script> <!-- Fin del código JavaScript -->
</body> <!-- Fin del cuerpo -->
</html> <!-- Fin del documento HTML -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Rectificada</title>
  <style>
    /* Estilos básicos para que se vea ordenado */
    .calculator {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      gap: 8px;
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: fit-content;
    }
    .display {
      grid-column: span 5;
      background: #fff;
      padding: 15px;
      font-size: 1.5rem;
      text-align: right;
      border-radius: 5px;
      margin-bottom: 10px;
      font-family: monospace;
      min-height: 50px;
    }
    button {
      padding: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #444;
      color: white;
    }
    .span-2 {
      grid-column: span 2;
    }
    .equal {
      background: #f90;
    }
    button:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>

    <button onclick="clearDisplay()">C</button>
    <button onclick="deleteChar()">⌫</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>
    <button onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('*')">×</button>
    <button onclick="append('Math.sqrt(')">√</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('-')">−</button>
    <button onclick="append('Math.pow(')">^</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('+')">+</button>
    <button onclick="append('Math.PI')">π</button>

    <button class="span-2" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="calculate()" class="equal span-2">=</button>

    <button onclick="append('Math.sin(')">sin</button>
    <button onclick="append('Math.cos(')">cos</button>
    <button onclick="append('Math.tan(')">tan</button>
    <button onclick="append('Math.log(')">log</button>
    <button onclick="append('Math.exp(')">exp</button>
  </div>

  <script>
    // Función para agregar valores al display
    function append(value) {
      const display = document.getElementById('display');
      if (display.innerText === '0') {
        display.innerText = value;
      } else {
        display.innerText += value;
      }
    }

    // Limpiar display
    function clearDisplay() {
      document.getElementById('display').innerText = '0';
    }

    // Borrar último carácter
    function deleteChar() {
      const display = document.getElementById('display');
      display.innerText = display.innerText.slice(0, -1) || '0';
    }

    // Evaluar expresión
    function calculate() {
      const display = document.getElementById('display');
      try {
        // Reemplazar operadores visuales por los reales de JS si es necesario
        let expr = display.innerText.replace(/÷/g, '/').replace(/×/g, '*');
        const result = eval(expr);
        display.innerText = result;
      } catch (e) {
        display.innerText = 'Error';
      }
    }
  </script>
</body>
</html>
